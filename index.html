<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>LostRuins</title>
<style>
  :root { --bg:#15120E; --panel:#211C16; --gold:#C8A24B; --text:#EDE6D6; --muted:#9A8E78; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    background: radial-gradient(120% 90% at 50% 0%, #221b13 0%, var(--bg) 60%);
    color: var(--text); font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100svh; text-align:center; padding:24px; gap:14px;
  }
  .logo { font-size:13vw; max-font-size:64px; letter-spacing:.04em; color:var(--gold);
    font-weight:800; text-shadow:0 2px 18px rgba(200,162,75,.25); }
  @media(min-width:520px){ .logo{ font-size:64px; } }
  .tag { color:var(--muted); font-size:15px; line-height:1.6; }
  .badge { margin-top:8px; border:1px solid rgba(200,162,75,.4); color:var(--gold);
    border-radius:999px; padding:7px 16px; font-size:13px; }
</style>
</head>
<body>
  <div class="logo">LostRuins</div>
  <div class="tag">잃어버린 유적으로 떠나는 1인 탐험 카드게임</div>
  <div class="badge">🚧 준비 중 — 배포 파이프라인 점검용 플레이스홀더</div>
</body>
</html>
